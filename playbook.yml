---
# Install Galaxy + Slurm + DRMAA (Ubuntu ≥22.04)
# Use Natefoo PPA for slurm-drmaa
- name: Install PostgreSQL objects
  hosts: dbservers
  become: true
  become_user: root
  roles:
    - galaxyproject.postgresql
    - role: galaxyproject.postgresql_objects
      become: true
      become_user: postgres

- name: Install/Expand Galaxy
  hosts: all
  become: true
  become_user: root
  pre_tasks:
    - name: Add official Slurm-DRMAA PPA (Natefoo)
      ansible.builtin.apt_repository:
        repo: ppa:natefoo/slurm-drmaa
        state: present
        update_cache: true
      when: install_slurm

    - name: Install Slurm-DRMAA from the correct PPA release
      ansible.builtin.apt:
        name: slurm-drmaa1
        state: present
        default_release: "{{ ansible_distribution_release }}"
        update_cache: true
      when: install_slurm

    - name: Install required packages
      ansible.builtin.package:
        name:
          - bzip2
          - git
          - make
          - tar
          - python3-venv
          - python3-lib2to3
          - slurm-wlm
        state: present

    - name: Ensure munge runtime dir exists
      ansible.builtin.file:
        path: /run/munge
        owner: munge
        group: munge
        mode: "0755"
        state: directory

    - name: Check if conda exists in conda prefix
      ansible.builtin.stat:
        path: "{{ miniconda_prefix }}/bin/conda"
      register: conda_bin

    - name: Check if mamba is available in conda prefix
      ansible.builtin.stat:
        path: "{{ miniconda_prefix }}/bin/mamba"
      register: mamba_bin

    - name: Migrate Miniconda to Miniforge if mamba is absent
      when:
        - conda_bin.stat.exists       # installation existante détectée
        - not mamba_bin.stat.exists   # mais pas mamba → c'est un Miniconda
      tags: [miniconda]
      block:
        - name: Download Miniforge installer
          ansible.builtin.get_url:
            url: "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh"
            dest: /tmp/miniforge_upgrade.sh
            mode: "0755"

        - name: Run Miniforge installer (upgrade mode)
          ansible.builtin.command:
            cmd: "bash /tmp/miniforge_upgrade.sh -u -b -p {{ miniconda_prefix }}"
          changed_when: true

        - name: Remove Miniforge installer
          ansible.builtin.file:
            path: /tmp/miniforge_upgrade.sh
            state: absent

    - name: Merge common and specific Galaxy configurations
      ansible.builtin.set_fact:
        galaxy_config: "{{ common_galaxy_config | ansible.builtin.combine(galaxy_config, recursive=true) }}"

  roles:
    - galaxyproject.galaxy
    - role: galaxyproject.miniconda
      become: true
      become_user: "{{ galaxy_user.name }}"
      environment:
        HOME: "/home/galaxy"
        XDG_CONFIG_HOME: "/home/galaxy/.config"
      vars:
        ansible_become_user: galaxy
      tags: [miniconda]
    - role: galaxyproject.nginx
      when: galaxyxpand_manage_nginx
    - role: galaxyproject.slurm
      become: true
      when: install_slurm
    - role: installUptime
      when: install_uptime

  post_tasks:

    - name: Overwrite nginx.conf
      ansible.builtin.template:
        src: "{{ inventory_dir }}/templates/nginx/nginx.conf.j2"
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart nginx
      when:
        - galaxyxpand_manage_nginx
        - (inventory_dir + '/templates/nginx/nginx.conf.j2') is file

    - name: Create and start Galaxy systemd units via galaxyctl
      ansible.builtin.command:
        cmd: galaxyctl restart
      become: true
      changed_when: true

    - name: Ensure Galaxy is enabled (for reboot persistence)
      ansible.builtin.systemd:
        name: galaxy.target
        state: started
        enabled: true
